# Read the Docs Build-Konfiguration (v2).
#
# Mehrsprachigkeit auf RTD:
#   - Dieses Repo ist Quelle fuer alle Sprachen (Kataloge unter docs/locale/).
#   - Im RTD-Dashboard ein Hauptprojekt (Sprache Deutsch) anlegen und je weiterer
#     Sprache ein Uebersetzungsprojekt (Englisch), als "Translation" verknuepft.
#   - RTD setzt die Sprache pro Projekt und blendet ein Sprach-Flyout ein.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - requirements: docs/requirements.txt
